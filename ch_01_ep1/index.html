<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>vivid/stasis 剧情整理</title>
<link rel="stylesheet" href="https://fontsapi.zeoseven.com/65/main/result.css"/>
<style>
:root{
  --color-bg-main:#000;
  --color-bg-panel:#111;
  --color-bg-card:#222;
  --color-bg-hover:#581C87;
  --color-bg-secondary:#333;
  --color-text-primary:#fff;
  --color-text-secondary:#aaa;
  --border-standard:2px solid #fff;
  --border-thin:1px solid #333;
  --font-main:"BoutiqueBitmap9x9",monospace;
  --highlight-color:#88DDFF;        /* 文本高亮颜色 */
  --narrator-color:#aaa;           /* 旁白文字颜色 */
}
*{
  margin:0;padding:0;box-sizing:border-box;
  border-radius:0!important;
  scrollbar-width:thin;
  -webkit-tap-highlight-color:transparent;
  transform:translateZ(0);
}
body{
  background:var(--color-bg-main);
  color:var(--color-text-primary);
  font-family:var(--font-main)!important;
  font-weight:normal;
  font-size:18px;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  padding:20px;
  display:flex;
  flex-direction:column;
}

/* ---------- 头部 & 元信息 ---------- */
header h1{
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:5px;
  color:#fff;
}
header h1 .pink{color:#FFB6C1;}
header h1 .blue{color:#4FC3F7;}
header p{
  color:var(--color-text-secondary);
  font-size:16px;
  margin-bottom:20px;
}
.meta-panel{
  background:var(--color-bg-panel);
  border:var(--border-standard);
  padding:15px;
  margin-bottom:25px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.meta-line{
  display:flex;
  gap:8px;
  font-size:16px;
}
.meta-label{
  color:var(--color-text-secondary);
  min-width:60px;
}
.meta-value{
  color:var(--color-text-primary);
}
.meta-divider{
  width:100%;
  border-top:var(--border-thin);
  margin:4px 0;
}

/* ---------- 章节标题 ---------- */
.chapter-title{
  font-size:22px;
  margin-bottom:20px;
  padding-bottom:10px;
  border-bottom:var(--border-thin);
}

/* ---------- 对话气泡 ---------- */
.msg-line{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-bottom:10px;
  align-items:center;
}
.speaker-name{
  font-size:14px;
  width:85%;
  max-width:85%;
  text-align:left;
}
.msg-bubble{
  max-width:85%;
  width:85%;
  padding:8px 12px;
  background:rgba(0,0,0,0.85);
  border:var(--border-standard);
  backdrop-filter:blur(2px);
  word-break:break-word;
  line-height:1.6;
  text-align:left;
}
.msg-narrator{
  border:none;
  color:var(--narrator-color);
  background:transparent;
}
.highlight-text{
  color:var(--highlight-color);
}

/* ---------- 分隔线（可带文字） ---------- */
.chapter-divider{
  width:100%;
  border-top:var(--border-thin);
  margin:12px 0;
}
.divider-with-text{
  display:flex;
  align-items:center;
  gap:12px;
  margin:12px 0;
  width:100%;
}
.divider-with-text::before,
.divider-with-text::after{
  content:"";
  flex:1;
  border-top:var(--border-thin);
}
.divider-with-text span{
  color:var(--color-text-secondary);
  font-size:16px;
  white-space:nowrap;
  padding:0 4px;
}

/* ---------- 折叠面板 ---------- */
.details-wrap{
  width:100%;
  margin-bottom:15px;
  background:var(--color-bg-panel);
  border:var(--border-standard);
}
.details-wrap summary{
  list-style:none;
  background:#0a0a0a;
  padding:10px 15px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:44px;
}
.details-wrap summary::-webkit-details-marker{display:none;}
.details-wrap summary::after{
  content:"▼";
  font-size:12px;
  color:#aaa;
}
.details-wrap[open] summary::after{
  transform:rotate(180deg);
}
.details-content{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ---------- 底部 ---------- */
footer{
  margin-top:auto;
  padding-top:30px;
  color:var(--color-text-secondary);
  font-size:14px;
}
</style>
</head>
<body>

// ------------------- 角色颜色表 -------------------
var CHARACTER_COLORS = {
  "Dawn":     "#8A9BFF",
  "解放者":   "#8A9BFF",
  "Tsuki":    "#FF69B4",
  "护卫者":   "#FF69B4",
  "Saturday": "#FFB6C1",
  "Storyteller":"#FFFFFF",
  "Detective":"#FFD700",
  "saturnalorbit":"#FFB6C1",
  "alli_tgshm":"#81C784",
  "Eri":      "#4FC3F7",
  "Kotomi":   "#4FC3F7",
  "Allison":  "#81C784",
  "Chiyo":    "#FFF176"
};
var DEFAULT_COLOR = "#aaaaaa";

// -------------------------------------------------
// 解析脚本（保持原语法）
function parseScript(text){
  var lines = text.split(/\r?\n/);
  var result = [];
  var inFold = false, foldTitle = "", foldChildren = [];

  function commitFold(){
    if (foldTitle){
      result.push({type:"fold",title:foldTitle,children:foldChildren});
      foldTitle="";foldChildren=[];
    }
    inFold = false;
  }

  for (var i=0;i<lines.length;i++){
    var raw = lines[i].trim();
    if (!raw || /^\/\//.test(raw)) continue;

    if (raw===']'){ commitFold(); continue; }

    var foldMatch = raw.match(/^\|([\^])(.+)\1\|\[$/);
    if (foldMatch){
      commitFold();
      inFold = true;
      foldTitle = foldMatch[2].trim();
      foldChildren = [];
      continue;
    }

    var dividerMatch = raw.match(/^\|-(.+)-[|]?$/);
    if (dividerMatch){
      result.push({type:"divider",label:dividerMatch[1].trim()});
      continue;
    }

    var dialogMatch = raw.match(/^\|([^|]*)\|([^|]*)\|?$/);
    if (dialogMatch){
      var speaker = dialogMatch[1].trim();
      var txt = dialogMatch[2].trim();
      var entry = {type:"dialog",speaker:speaker,text:txt};
      if (inFold) foldChildren.push(entry);
      else result.push(entry);
      continue;
    }
  }
  commitFold();
  return result;
}

// 高亮处理（**文字** → <span class="highlight-text">文字</span>）
function parseHighlight(text){
  return text.replace(/\*\*(.+?)\*\*/g,'<span class="highlight-text">$1</span>');
}

// 创建单条对话的 DOM
function createDialogueEl(d){
  var wrapper = document.createElement('div');
  wrapper.className='msg-line';

  if (d.speaker && d.speaker.trim()){
    var name = document.createElement('span');
    name.className='speaker-name';
    name.textContent=d.speaker;
    var col = CHARACTER_COLORS[d.speaker]||DEFAULT_COLOR;
    name.style.color=col;
    wrapper.appendChild(name);
  }

  var bubble = document.createElement('div');
  // 旁白（speaker 为空）使用无边框样式
  bubble.className='msg-bubble' + (d.speaker && d.speaker.trim() ? '' : ' msg-narrator');
  bubble.innerHTML=parseHighlight(d.text);
  wrapper.appendChild(bubble);
  return wrapper;
}

// 渲染章节
function renderChapter(){
  document.title = CHAPTER.title + " - vivid/stasis";
  document.getElementById('metaChapter').textContent = 'EPISODE ' + CHAPTER.title;
  document.getElementById('metaType').textContent = CHAPTER.special ? '特殊章（点击展开）' : '普通章';
  document.getElementById('chapterTitle').innerHTML = '<div class="chapter-title">EPISODE ' + CHAPTER.title + '</div>';

  var container = document.getElementById('dialogueContainer');
  container.innerHTML='';

  var parsed = parseScript(SCRIPT);

  function renderItems(items,parent){
    items.forEach(function(item){
      if (item.type==='fold'){
        var d = document.createElement('details');
        d.className='details-wrap';
        var s = document.createElement('summary');
        s.textContent=item.title;
        d.appendChild(s);
        var inner = document.createElement('div');
        inner.className='details-content';
        renderItems(item.children,inner);
        d.appendChild(inner);
        parent.appendChild(d);
      }else if (item.type==='dialog'){
        parent.appendChild(createDialogueEl(item));
      }else if (item.type==='divider'){
        if (item.label){
          var div=document.createElement('div');
          div.className='divider-with-text';
          var span=document.createElement('span');
          span.textContent=item.label;
          div.appendChild(span);
          parent.appendChild(div);
        }else{
          var line=document.createElement('div');
          line.className='chapter-divider';
          parent.appendChild(line);
        }
      }
    });
  }

  if (CHAPTER.special){
    var d = document.createElement('details');
    d.className='details-wrap';
    var s = document.createElement('summary');
    s.textContent = CHAPTER.title + ' (特殊章)';
    d.appendChild(s);
    var inner = document.createElement('div');
    inner.className='details-content';
    renderItems(parsed,inner);
    d.appendChild(inner);
    container.appendChild(d);
  }else{
    renderItems(parsed,container);
  }
}

renderChapter();
</script>
</body>
</html>
