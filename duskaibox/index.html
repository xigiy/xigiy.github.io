<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>duskaibox</title>
<style>
@import url("https://fontsapi.zeoseven.com/65/main/result.css");
:root{--bubble-opacity:0.85;--bg-mask-opacity:0.2;--bubble-blur:2px;--border-standard:2px solid #fff;--mobile-btn-height:50px;--desktop-btn-height:44px;--menu-bg:#111;--menu-hover:#581C87;--menu-danger:#771f1f;--font-main:"BoutiqueBitmap9x9",monospace;}
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;scrollbar-width:thin;-webkit-tap-highlight-color:transparent;transform:translateZ(0);font-family:var(--font-main)!important;font-weight:normal;}
input,button,select,textarea,option,optgroup{font-family:var(--font-main)!important;font-weight:normal;pointer-events:auto;}
body{background:#000;color:#fff;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:18px;-webkit-text-size-adjust:none;overscroll-behavior:none;user-select:none;}
.config-bar,.input-bar,.control-panel,.bubble-menu,.mobile-bubble-menu,.modal-box,details,input,button,select,textarea{border:var(--border-standard)!important;}
summary,.details-divider,.bubble-menu-group,.mobile-menu-group,.name,.chat-box,.chat-wrap,.menu-close-btn{border:none!important;}
@keyframes flashHard {0%{color:#8A2BE2;}33%{color:#8A2BE2;}33.1%{color:#FFFFFF;}66%{color:#FFFFFF;}66.1%{color:#FF69B4;}100%{color:#FF69B4;}}
.flash-text{width:100%;font-size:14px;line-height:1.5;text-align:center;margin:0 0 8px 0;padding:0;overflow:hidden;}
.flash-text span{display:inline;animation:flashHard 1s linear infinite;transition:none!important;}
.menu-close-btn{position:absolute;top:15px;right:10px;width:36px;height:36px;background:transparent;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0.7;transition:all .2s;}
.menu-close-btn:active{opacity:1;background:var(--menu-hover);}
details{width:100%;margin-bottom:8px;background:var(--menu-bg);overflow:hidden;flex-shrink:0;}
summary{list-style:none;width:100%;padding:10px 12px;background:#0a0a0a;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:space-between;min-height:var(--desktop-btn-height);user-select:none;}
summary::-webkit-details-marker{display:none;}
summary::after{content:"▼";font-size:12px;color:#aaa;transition:transform .2s ease;}
details[open] summary::after{transform:rotate(180deg);}
summary:active{background:#1a1a1a;}
.details-content{padding:12px;display:flex;flex-direction:column;gap:10px;}
.details-divider{width:100%;border-top:1px solid #333!important;margin:4px 0;}
.bubble-menu{position:absolute;background:var(--menu-bg);z-index:99999;display:none;flex-direction:column;min-width:220px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.8);}
.bubble-menu.show{display:flex;}
.bubble-menu-group{font-size:12px;color:#aaa;padding:6px 12px;background:#0a0a0a;border-bottom:1px solid #333;}
.bubble-menu-btn{width:100%;background:transparent;border:none!important;border-bottom:1px solid #333!important;color:#fff;padding:10px 15px;text-align:left;cursor:pointer;font-size:16px;min-height:var(--desktop-btn-height);display:flex;flex-direction:column;justify-content:center;}
.bubble-menu-btn:last-child{border-bottom:none!important;}
.bubble-menu-btn:active{background:var(--menu-hover);}
.bubble-menu-btn.danger:active{background:var(--menu-danger);}
.mobile-menu-mask{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.7);z-index:99998;display:none;opacity:0;transition:opacity .2s ease;}
.mobile-menu-mask.show{display:block;opacity:1;}
.mobile-bubble-menu{position:fixed;bottom:0;left:0;width:100vw;background:var(--menu-bg);z-index:99999;display:none;flex-direction:column;transform:translateY(100%);transition:transform .25s ease-out;padding-bottom:env(safe-area-inset-bottom);}
.mobile-bubble-menu.show{display:flex;transform:translateY(0);}
.mobile-menu-group{font-size:13px;color:#aaa;padding:10px 16px;background:#0a0a0a;border-bottom:1px solid #333;}
.mobile-menu-btn{width:100%;background:transparent;border:none!important;border-bottom:1px solid #333!important;color:#fff;padding:0 16px;text-align:left;cursor:pointer;font-size:17px;min-height:var(--mobile-btn-height);display:flex;flex-direction:column;justify-content:center;}
.mobile-menu-btn:last-child{border-bottom:none!important;}
.mobile-menu-btn:active{background:var(--menu-hover);}
.mobile-menu-btn.danger:active{background:var(--menu-danger);}
.mobile-menu-cancel{margin-top:8px;background:#222;border-top:2px solid #333!important;font-weight:bold;text-align:center;}
.control-panel{position:absolute;top:0;left:0;height:100%;width:280px;background:var(--menu-bg);transform:translateX(-100%);transition:transform .25s ease-out;z-index:9999;padding:60px 10px 20px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;overflow-x:hidden;font-size:18px;-webkit-overflow-scrolling:touch;min-height:0;}
.control-panel.open{transform:translateX(0);}
.control-panel::-webkit-scrollbar{width:4px;}
.control-panel::-webkit-scrollbar-thumb{background:#555;}
.btn-danger{background:var(--menu-danger)!important;}
.btn-danger:active{background:#992828!important;}
.btn-secondary{background:#333!important;}
.btn-secondary:active{background:#444!important;}
.btn-row{display:flex;gap:8px;width:100%;}
.btn-row button,.btn-row label{flex:1;margin:0!important;min-height:var(--desktop-btn-height);display:flex;align-items:center;justify-content:center;}
#bgImageFile,#importFile,#presetImportFile,#worldbookImportFile{display:none;}
.form-group{display:flex;flex-direction:column;gap:5px;width:100%;}
.form-group label{color:#ccc;font-size:16px;}
.form-group input,.form-group select,.form-group textarea{background:#222;color:#fff;font-size:18px;padding:8px 10px;resize:none;}
.form-group button{background:var(--menu-hover);color:#fff;font-size:16px;padding:8px;cursor:pointer;margin-top:5px;min-height:var(--desktop-btn-height);}
#fileSelectBtn,#presetFileSelectBtn,#importFileBtn{width:100%;background:#333;color:#fff;padding:8px;font-size:16px;cursor:pointer;text-align:center;min-height:var(--desktop-btn-height);display:flex;align-items:center;justify-content:center;}
#fileSelectBtn:active,#presetFileSelectBtn:active,#importFileBtn:active{background:#444;}
.panel-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:36px;height:36px;background:rgba(0,0,0,.3);color:#fff;border:var(--border-standard)!important;z-index:1000;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.6;transition:opacity .2s;}
.panel-toggle:hover,.panel-toggle:active{opacity:1;background:var(--menu-hover);}
.config-bar{background:#111;padding:12px;font-size:18px;z-index:100;display:flex;align-items:center;justify-content:center;position:relative;}
.top-title-text{text-align:center;flex-shrink:0;}
.chat-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;position:relative;background:#000;background-image:none;background-repeat:no-repeat;background-position:center;background-size:cover;background-attachment:fixed;}
.chat-wrap::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:#000;opacity:var(--bg-mask-opacity);z-index:1;pointer-events:none;}
.chat-box{flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;-webkit-overflow-scrolling:touch;align-items:center;font-size:18px;background:transparent;z-index:10;position:relative;}
.chat-box::-webkit-scrollbar{width:4px;}
.chat-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);}
.author-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;color:rgba(255,255,255,.15);z-index:2;pointer-events:none;user-select:none;letter-spacing:2px;display:none;}
.author-watermark.show{display:block;}
.msg-user{max-width:85%;width:85%;padding:6px 10px;word-wrap:break-word;border:var(--bubble-border);align-self:center;background:rgba(0,0,0,var(--bubble-opacity));backdrop-filter:blur(var(--bubble-blur));z-index:10;position:relative;transition:transform .1s ease;cursor:pointer;}
.msg-user:active{transform:scale(.98);background:rgba(0,0,0,.95);}
.msg-bot{max-width:85%;width:85%;padding:6px 10px;word-wrap:break-word;border:var(--bubble-border);align-self:center;background:rgba(0,0,0,var(--bubble-opacity));backdrop-filter:blur(var(--bubble-blur));z-index:10;position:relative;transition:transform .1s ease;cursor:pointer;}
.msg-bot:active{transform:scale(.98);background:rgba(0,0,0,.95);}
.msg-system{max-width:70%;width:fit-content;padding:8px 12px;word-wrap:break-word;border:var(--border-standard);align-self:center;background:rgba(0,0,0,.9);backdrop-filter:blur(var(--bubble-blur));z-index:10;position:relative;text-align:center;}
.name{font-weight:normal;margin-bottom:6px;display:block;font-size:19px;}
.input-bar{display:flex;background:#111;position:relative;z-index:100;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
#userInput{flex:1;background:#222;border:none!important;border-right:var(--border-standard)!important;color:#fff;padding:10px 12px;font-size:18px;white-space:pre-wrap;word-wrap:break-word;overflow-y:auto;min-height:48px;max-height:100px;outline:none;}
#sendBtn{width:80px;background:var(--menu-hover);border:none!important;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;align-self:stretch;}
#sendBtn:active{background:#7b2cb0;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:100000;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{width:90%;max-width:300px;background:#111;padding:20px;display:flex;flex-direction:column;gap:15px;pointer-events:auto;}
.modal-title{font-size:18px;text-align:center;}
.modal-desc{font-size:14px;color:#aaa;text-align:center;}
.modal-input{width:100%;background:#222;color:#fff;padding:8px 10px;font-size:16px;min-height:var(--desktop-btn-height);}
.modal-btn-row{display:flex;gap:10px;}
.modal-btn-row button{flex:1;padding:8px;color:#fff;cursor:pointer;min-height:var(--desktop-btn-height);}
.modal-cancel{background:#333;}
.modal-confirm{background:var(--menu-hover);}
.modal-confirm.danger{background:var(--menu-danger);}
.worldbook-modal{width:92vw!important;max-width:900px!important;height:85vh!important;max-height:780px!important;display:flex;flex-direction:column;padding:12px!important;}
.worldbook-header{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.worldbook-main{flex:1;display:flex;gap:12px;min-height:0;overflow:hidden;}
.worldbook-list{width:30%;display:flex;flex-direction:column;gap:8px;overflow-y:auto;border:var(--border-standard);padding:10px;background:#111;}
.worldbook-editor{flex:1;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.worldbook-entry-item{display:flex;align-items:center;gap:6px;padding:8px;background:#222;border:var(--border-standard);cursor:pointer;}
.worldbook-entry-item.active{background:var(--menu-hover);}
.worldbook-entry-item .enable-dot{width:8px;height:8px;border-radius:50%!important;}
.worldbook-entry-item .enable-dot.active{background:#00ff00;}
.worldbook-entry-item .enable-dot.inactive{background:#ff0000;}
.worldbook-entry-item .entry-key{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
@media screen and (max-width:767px){
.bubble-menu{display:none!important;}
input:not(.panel-toggle),button:not(.panel-toggle),select,textarea{min-height:var(--mobile-btn-height);}
.btn-row button,.btn-row label{min-height:var(--mobile-btn-height);}
.form-group button{min-height:var(--mobile-btn-height);}
#fileSelectBtn,#presetFileSelectBtn,#importFileBtn{min-height:var(--mobile-btn-height);}
.control-panel{width:85vw;max-width:320px;}
summary{min-height:var(--mobile-btn-height);}
.menu-close-btn{width:40px;height:40px;font-size:26px;}
.msg-system{max-width:85%;}
.worldbook-main{flex-direction:column;}
.worldbook-list{width:100%;height:35%;}
.worldbook-modal{width:96vw!important;height:90vh!important;max-width:96vw!important;max-height:90vh!important;margin:5vh auto!important;}
}
</style>
</head>
<body>
<div class="bubble-menu" id="desktopBubbleMenu">
<div class="bubble-menu-group">剧情编辑</div>

</div>
</div>

</div>

function createBubbleElement(text,role,index){const div=document.createElement("div");if(role==="user"){div.className="msg-user";}else if(role==="assistant"){div.className="msg-bot";}else if(role==="system"){div.className="msg-system";}div.dataset.index=index;div.dataset.role=role;if(role==="system"){const content=document.createElement("div");content.innerText=`【${CONFIG.systemName}】${text}`;content.style.color=CONFIG.systemColor;div.appendChild(content);return div;}const name=document.createElement("span");name.className="name";name.style.color=role==="user"?CONFIG.userColor:CONFIG.botColor;name.innerText=role==="user"?CONFIG.userName:CONFIG.botName;const content=document.createElement("div");content.innerText=text;div.appendChild(name);div.appendChild(content);if(role==="user"||role==="assistant"){div.addEventListener('click',(e)=>openBubbleMenu(index,div,e));}return div;}

async function fetchRealModels(){
  CONFIG.baseUrl=DOM.apiBase.value.trim();
  CONFIG.apiKey=DOM.apiKey.value.trim();
  DOM.fetchModelsBtn.disabled=true;
  DOM.fetchModelsBtn.innerText="加载中";
  try{
    const res=await fetch(CONFIG.baseUrl+"models",{method:"GET",headers:{"Authorization":"Bearer "+CONFIG.apiKey}});
    if(!res.ok)throw new Error();
    const data=await res.json();
    DOM.modelSelect.innerHTML="";
    const models=data.data||[];
    if(models.length===0){const opt=document.createElement("option");opt.value="gpt-3.5-turbo";opt.innerText="默认模型";DOM.modelSelect.appendChild(opt);}
    else{models.forEach(m=>{const opt=document.createElement("option");opt.value=m.id||m.model;opt.innerText=m.id||m.model;DOM.modelSelect.appendChild(opt);});}
    const savedModel=CONFIG.model;
    const modelOptions=Array.from(DOM.modelSelect.options).map(opt=>opt.value);
    DOM.modelSelect.value=modelOptions.includes(savedModel)?savedModel:models[0]?.id||"gpt-3.5-turbo";
    CONFIG.model=DOM.modelSelect.value;
    addSystemMsg("模型刷新成功");
  }catch(e){addSystemMsg("模型获取失败");syncFormWithConfig();}
  finally{DOM.fetchModelsBtn.disabled=false;DOM.fetchModelsBtn.innerText="刷新模型列表";}
}

function newWorldbook(){showModal({title:"新建世界书",desc:"输入世界书名称",inputValue:"",onConfirm:()=>{const name=DOM.modalInput.value.trim();if(!name||CONFIG.worldBooks[name]){addSystemMsg("名称无效或已存在");return;}CONFIG.worldBooks[name]={entries:[]};CONFIG.activeWorldBook=name;refreshWorldbookSelect();renderWorldbookEntries();clearEntryEditor();}});}

function importWorldbook(file){const reader=new FileReader();reader.onload=(evt)=>{try{const data=JSON.parse(evt.target.result);if(!data.name||!data.entries)throw new Error();if(CONFIG.worldBooks[data.name])data.name=data.name+"_"+Date.now();CONFIG.worldBooks[data.name]={entries:data.entries};CONFIG.activeWorldBook=data.name;refreshWorldbookSelect();renderWorldbookEntries();addSystemMsg("世界书导入成功");}catch(e){addSystemMsg("导入格式错误");}};reader.readAsText(file);}

function saveEntry(){if(!currentEntryId){addSystemMsg("请先选择或新建词条");return;}const activeBook=CONFIG.worldBooks[CONFIG.activeWorldBook];const entry=activeBook.entries.find(e=>e.id===currentEntryId);if(!entry)return;entry.key=DOM.entryKey.value.trim();entry.content=DOM.entryContent.value.trim();entry.enable=DOM.entryEnable.checked;if(!entry.key){addSystemMsg("关键词不能为空");return;}renderWorldbookEntries();saveConfigToLocal();addSystemMsg("词条已保存");}
function deleteEntry(){if(!currentEntryId){addSystemMsg("请先选择词条");return;}const activeBook=CONFIG.worldBooks[CONFIG.activeWorldBook];activeBook.entries=activeBook.entries.filter(e=>e.id!==currentEntryId);clearEntryEditor();saveConfigToLocal();addSystemMsg("词条已删除");}
function buildFinalSystemPrompt(){
  const now=getNowTime();
  let prompt=`你的名字是${CONFIG.botName}\n用户名字是${CONFIG.userName}\n当前对话时间：${now}\n${CONFIG.systemPrompt}`;
  const activeBook=CONFIG.worldBooks[CONFIG.activeWorldBook];
  if(activeBook&&activeBook.entries.length>0){
    const enableEntries=activeBook.entries.filter(e=>e.enable);
    if(enableEntries.length>0){
      prompt+="\n\n【世界书设定】\n以下是对话必须严格遵守的设定，当用户提到对应关键词时，必须完全按照设定内容回复，不得偏离设定：";
      enableEntries.forEach((entry,idx)=>{prompt+=`\n${idx+1}. 触发关键词：${entry.key} - 设定内容：${entry.content}`;});
    }
  }
  return prompt;
}
async function send(){
  const txt=DOM.userInput.value.trim();
  if(!txt)return;
  addUserMsg(txt);
  if(CONFIG.autoClearSwitch==="on")DOM.userInput.value="";
  try{
    const finalSystemPrompt=buildFinalSystemPrompt();
    const sendHistory=CONFIG.history.filter(msg=>msg.role==="user"||msg.role==="assistant");
    const messages=[{role:"system",content:finalSystemPrompt},...sendHistory];
    const res=await fetch(CONFIG.baseUrl+"chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+CONFIG.apiKey},body:JSON.stringify({model:CONFIG.model,messages:messages,temperature:CONFIG.temperature,top_p:CONFIG.topP})});
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||"无回复";
    addBotMsg(reply);
  }catch(e){addSystemMsg("请求失败");}
}

  CONFIG.bgImageOpacity=parseFloat(DOM.bgImageOpacity.value);
  CONFIG.bubbleBlur=parseInt(DOM.bubbleBlur.value);
  CONFIG.bubbleBorder=DOM.bubbleBorderSwitch.value;
  CONFIG.watermarkSwitch=DOM.watermarkSwitch.value;
  CONFIG.enterSendSwitch=DOM.enterSendSwitch.value;
  CONFIG.autoClearSwitch=DOM.autoClearSwitch.value;
  saveConfigToLocal();
  updateTopTitle();
  updateBubbleStyle();
  updateBgImageOpacity();
  updateAuthorWatermark();
  renderAllHistory();
  DOM.controlPanel.classList.remove("open");
  addSystemMsg("配置已保存");
});
DOM.fetchModelsBtn.addEventListener('click',fetchRealModels);
DOM.sendBtn.addEventListener('click',send);
DOM.userInput.addEventListener('keydown',(e)=>{if(CONFIG.enterSendSwitch==="on"&&e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
DOM.bgImageFile.addEventListener('change',(e)=>{const file=e.target.files[0];if(!file)return;if(!file.type.startsWith("image/")){addSystemMsg("请选择图片");return;}const reader=new FileReader();reader.onload=(evt)=>{CONFIG.bgImageBase64=evt.target.result;updateChatBg();addSystemMsg("背景图已加载");};reader.readAsDataURL(file);});
DOM.clearBgBtn.addEventListener('click',()=>{CONFIG.bgImageBase64="";DOM.bgImageFile.value="";updateChatBg();addSystemMsg("背景图已清除");});
DOM.temperature.addEventListener('input',debounce((e)=>{CONFIG.temperature=parseFloat(e.target.value);DOM.tempText.innerText=CONFIG.temperature.toFixed(1);}));
DOM.topP.addEventListener('input',debounce((e)=>{CONFIG.topP=parseFloat(e.target.value);DOM.topPText.innerText=CONFIG.topP.toFixed(2);}));
DOM.bgImageOpacity.addEventListener('input',(e)=>{CONFIG.bgImageOpacity=parseFloat(e.target.value);updateBgImageOpacity();});
DOM.bubbleOpacity.addEventListener('input',(e)=>{CONFIG.bubbleOpacity=parseFloat(e.target.value);updateBubbleStyle();});
DOM.bubbleBlur.addEventListener('input',(e)=>{CONFIG.bubbleBlur=parseInt(e.target.value);updateBubbleStyle();});
DOM.clearHistoryBtn.addEventListener('click',()=>{showModal({title:"清空对话",desc:"清空全部聊天记录",confirmClass:"danger",onConfirm:clearHistory});});
DOM.resetPromptBtn.addEventListener('click',resetPrompt);
DOM.clearAllBtn.addEventListener('click',()=>{showModal({title:"恢复默认",desc:"清空所有本地配置",confirmClass:"danger",onConfirm:clearAllData});});
DOM.exportBtn.addEventListener('click',exportHistory);
DOM.importFile.addEventListener('change',(e)=>{const file=e.target.files[0];if(file)importHistory(file);});
DOM.savePresetBtn.addEventListener('click',savePreset);
DOM.loadPresetBtn.addEventListener('click',loadPreset);
DOM.deletePresetBtn.addEventListener('click',()=>{showModal({title:"删除预设",desc:"永久删除该人设",confirmClass:"danger",onConfirm:deletePreset});});
DOM.openWorldbookBtn.addEventListener('click',openWorldbookModal);
DOM.worldbookCloseBtn.addEventListener('click',closeWorldbookModal);
DOM.worldbookModal.addEventListener('click',(e)=>{if(e.target===DOM.worldbookModal)closeWorldbookModal();});
DOM.worldbookSelect.addEventListener('change',()=>{CONFIG.activeWorldBook=DOM.worldbookSelect.value;renderWorldbookEntries();clearEntryEditor();});
DOM.newWorldbookBtn.addEventListener('click',newWorldbook);
DOM.deleteWorldbookBtn.addEventListener('click',deleteWorldbook);
DOM.worldbookImportFile.addEventListener('change',(e)=>{const file=e.target.files[0];if(file)importWorldbook(file);});
DOM.newEntryBtn.addEventListener('click',newEntry);
DOM.saveEntryBtn.addEventListener('click',saveEntry);
DOM.deleteEntryBtn.addEventListener('click',deleteEntry);
window.addEventListener('resize',debounce(()=>{isMobile=window.innerWidth<768;closeAllBubbleMenus();},100));
document.addEventListener('DOMContentLoaded',()=>{loadConfigFromLocal();});
</script>
</body>
</html>
